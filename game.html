<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>🔥 Ultimate Tic Tac Toe AI</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
      overflow:hidden;
    }

    .container{

      text-align:center;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(15px);
      border:1px solid rgba(255,255,255,0.2);

      padding:30px;
      border-radius:25px;

      box-shadow:
      0 0 25px rgba(0,255,255,0.4),
      0 0 50px rgba(0,255,255,0.2);

      animation:glow 3s infinite alternate;

    }

    @keyframes glow{

      from{
        box-shadow:
        0 0 20px #00ffff,
        0 0 40px #00ffff;
      }

      to{
        box-shadow:
        0 0 30px #3b82f6,
        0 0 60px #3b82f6;
      }

    }

    h1{

      color:white;
      margin-bottom:10px;
      font-size:45px;
      letter-spacing:2px;

      text-shadow:
      0 0 10px cyan,
      0 0 20px cyan;

    }

    .subtitle{
      color:#cbd5e1;
      margin-bottom:25px;
      font-size:18px;
    }

    .board{

      display:grid;
      grid-template-columns:repeat(3,120px);
      gap:12px;
      justify-content:center;

    }

    .cell{

      width:120px;
      height:120px;

      background:rgba(255,255,255,0.1);

      border:2px solid rgba(255,255,255,0.2);

      border-radius:20px;

      display:flex;
      justify-content:center;
      align-items:center;

      font-size:55px;
      font-weight:bold;

      cursor:pointer;

      transition:0.3s;

      color:white;

    }

    .cell:hover{

      transform:scale(1.08);

      background:rgba(255,255,255,0.2);

      box-shadow:
      0 0 15px cyan,
      0 0 30px cyan;

    }

    #status{

      margin-top:25px;
      color:white;
      font-size:24px;
      font-weight:bold;

      text-shadow:0 0 10px cyan;

    }

    button{

      margin-top:25px;

      padding:14px 28px;

      border:none;
      border-radius:12px;

      background:linear-gradient(45deg,#06b6d4,#3b82f6);

      color:white;

      font-size:18px;
      font-weight:bold;

      cursor:pointer;

      transition:0.3s;

      box-shadow:
      0 0 10px cyan;

    }

    button:hover{

      transform:scale(1.08);

      box-shadow:
      0 0 20px cyan,
      0 0 40px cyan;

    }

    .x{
      color:#22c55e;
      text-shadow:0 0 15px #22c55e;
    }

    .o{
      color:#f43f5e;
      text-shadow:0 0 15px #f43f5e;
    }

  </style>

</head>

<body>

<div class="container">

  <h1>🎮 TIC TAC TOE AI</h1>

  <p class="subtitle">
    Human vs AI Battle ⚡
  </p>

  <div class="board" id="board">

    <div class="cell" onclick="makeMove(0)"></div>
    <div class="cell" onclick="makeMove(1)"></div>
    <div class="cell" onclick="makeMove(2)"></div>

    <div class="cell" onclick="makeMove(3)"></div>
    <div class="cell" onclick="makeMove(4)"></div>
    <div class="cell" onclick="makeMove(5)"></div>

    <div class="cell" onclick="makeMove(6)"></div>
    <div class="cell" onclick="makeMove(7)"></div>
    <div class="cell" onclick="makeMove(8)"></div>

  </div>

  <div id="status">
    Your Turn (X)
  </div>

  <button onclick="restartGame()">
    🔄 Restart Game
  </button>

</div>

<script>

let board = ["","","","","","","","",""];

let gameOver = false;

const cells = document.querySelectorAll(".cell");

function makeMove(index){

  if(board[index] !== "" || gameOver){
    return;
  }

  board[index] = "X";

  cells[index].innerHTML = "X";

  cells[index].classList.add("x");

  if(checkWinner("X")){

    document.getElementById("status").innerHTML =
    "🏆 YOU WIN!";

    gameOver = true;

    return;
  }

  if(boardFull()){

    document.getElementById("status").innerHTML =
    "🤝 MATCH DRAW!";

    return;
  }

  document.getElementById("status").innerHTML =
  "🤖 AI Thinking...";

  setTimeout(aiMove,700);

}

function aiMove(){

  let empty = [];

  for(let i=0;i<board.length;i++){

    if(board[i] === ""){
      empty.push(i);
    }

  }

  let randomIndex =
  empty[Math.floor(Math.random()*empty.length)];

  board[randomIndex] = "O";

  cells[randomIndex].innerHTML = "O";

  cells[randomIndex].classList.add("o");

  if(checkWinner("O")){

    document.getElementById("status").innerHTML =
    "💀 AI WINS!";

    gameOver = true;

    return;
  }

  if(boardFull()){

    document.getElementById("status").innerHTML =
    "🤝 MATCH DRAW!";

    return;
  }

  document.getElementById("status").innerHTML =
  "🔥 Your Turn (X)";

}

function checkWinner(player){

  const patterns = [

    [0,1,2],
    [3,4,5],
    [6,7,8],

    [0,3,6],
    [1,4,7],
    [2,5,8],

    [0,4,8],
    [2,4,6]

  ];

  for(let pattern of patterns){

    let [a,b,c] = pattern;

    if(
      board[a] === player &&
      board[b] === player &&
      board[c] === player
    ){
      return true;
    }

  }

  return false;

}

function boardFull(){

  return board.every(cell => cell !== "");

}

function restartGame(){

  board = ["","","","","","","","",""];

  gameOver = false;

  cells.forEach(cell => {

    cell.innerHTML = "";

    cell.classList.remove("x");

    cell.classList.remove("o");

  });

  document.getElementById("status").innerHTML =
  "🔥 Your Turn (X)";

}

</script>

</body>

</html>
