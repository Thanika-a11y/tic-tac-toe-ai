<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <title>Tic Tac Toe AI</title> <link rel="stylesheet" href="style.css"/> </head> <body> <div class="loader" id="loader"> <div class="spinner"></div > <h2>Loading AI Engine...</h2> </div> <canvas id="particles"></canvas> <div class="container"> <div class="top-bar"> <h1>Tic Tac Toe AI</h1> <button id="themeToggle">🌙</button> </div> <div class="scoreboard"> <div class="score-card"> <h3>Player</h3> <span id="playerScore">0</span> </div> <div class="score-card"> <h3>Draws</h3> <span id="drawScore">0</span> </div> <div class="score-card"> <h3>AI</h3> <span id="aiScore">0</span> </div> </div> <div class="controls"> <select id="difficulty"> <option value="easy">Easy</option> <option value="medium">Medium</option> <option value="hard" selected>Hard</option> </select> <button id="restartBtn">Restart</button> <button id="newGameBtn">New Game</button> </div> <div class="status" id="status">Your Turn</div> <div class="thinking" id="thinking"> AI Thinking... </div> <div class="board" id="board"> <div class="cell" data-index="0"></div> <div class="cell" data-index="1"></div> <div class="cell" data-index="2"></div> <div class="cell" data-index="3"></div> <div class="cell" data-index="4"></div> <div class="cell" data-index="5"></div> <div class="cell" data-index="6"></div> <div class="cell" data-index="7"></div> <div class="cell" data-index="8"></div> </div> </div> <div class="modal" id="resultModal"> <div class="modal-content"> <h2 id="resultText"></h2> <button id="closeModal">Play Again</button> </div> </div> <script src="script.js"></script> </body> </html>
